<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Send JSON and File to Backend</title>
</head>

<body>
    <h1>Upload JSON and File</h1>
    <input type="file" id="fileInput">
    <button onclick="uploadData()">Upload</button>

    <script>
        function uploadData() {
            const jsonData = {
                key1: 'value1',
                key2: 'value2',
            };

            // Assuming you have a file to send (in this example, a File object obtained from an input element)
            const file = document.getElementById('fileInput').files[0];

            // Create a new Blob object with the JSON data
            const jsonDataBlob = new Blob([JSON.stringify(jsonData)], { type: 'application/json' });

            // Create a FormData object and append the Blob and File objects to it
            const formData = new FormData();
            formData.append('jsonData', jsonDataBlob, 'data.json');
            formData.append('file', file, file.name);

            // Send the data to the backend using the Fetch API
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
                .then(response => response.text())
                .then(responseText => {
                    console.log(responseText);
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }
    </script>
</body>

</html>
